<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마케팅 지원 디자인 — Hansunmi</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="../css/marketing.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="sub-nav">
    <a href="../index.html" class="nav-logo">Hansunmi</a>
    <a href="../index.html#works" class="back-btn">← Works</a>
  </nav>

  <!-- HERO -->
  <header class="sub-hero">
    <div class="sub-label">Marketing</div>
    <h1 class="sub-title">마케팅 지원 디자인</h1>
    <p class="sub-desc">SNS 콘텐츠 · 배너 · 브로슈어 · 인쇄물</p>
  </header>

  <!-- BENTO GRID -->
  <main class="bento-wrap">
    <div class="bento-grid">

      <!-- 1. backwall1 — tall / large popup -->
      <div class="bento-item" data-label="Back Wall 01"
           data-slides='[{"type":"large","src":"../img/marketings/backwall.jpg"}]'>
        <img class="bento-thumb" src="../img/marketings/backwall.jpg" alt="Back Wall 01" />
        <div class="bento-overlay">
          <span class="bento-tag">Back Wall 01</span>
          <span class="bento-icon">+</span>
        </div>
      </div>

      <!-- 2. backwall2 — composite(1) + 개별 4장 = 5슬라이드 -->
      <div class="bento-item" data-label="Back Wall 02"
           data-slides='[{"type":"composite","srcs":["../img/marketings/backwall2_1.jpg","../img/marketings/backwall2_2.jpg","../img/marketings/backwall2_3.jpg","../img/marketings/backwall2_4.jpg"]},{"type":"image","src":"../img/marketings/backwall2_1.jpg"},{"type":"image","src":"../img/marketings/backwall2_2.jpg"},{"type":"image","src":"../img/marketings/backwall2_3.jpg"},{"type":"image","src":"../img/marketings/backwall2_4.jpg"}]'>
        <img class="bento-thumb" src="../img/marketings/backwall2_1.jpg" alt="Back Wall 02" />
        <div class="bento-overlay">
          <span class="bento-tag">Back Wall 02</span>
          <span class="bento-icon">+</span>
        </div>
      </div>

      <!-- 3. brochure1 -->
      <div class="bento-item" data-label="브로슈어 01"
           data-slides='[{"type":"image","src":"../img/marketings/brochure1_1.jpg"},{"type":"image","src":"../img/marketings/brochure1_2.jpg"},{"type":"image","src":"../img/marketings/brochure1_4.jpg"}]'>
        <img class="bento-thumb" src="../img/marketings/thumbnail01.jpg" alt="브로슈어 01" />
        <div class="bento-overlay">
          <span class="bento-tag">브로슈어 01</span>
          <span class="bento-icon">+</span>
        </div>
      </div>

      <!-- 4. brochure2 -->
      <div class="bento-item" data-label="브로슈어 02"
           data-slides='[{"type":"image","src":"../img/marketings/brochure2_1.jpg"},{"type":"image","src":"../img/marketings/brochure2_2.jpg"},{"type":"image","src":"../img/marketings/brochure2_3.jpg"},{"type":"image","src":"../img/marketings/brochure2_4.jpg"}]'>
        <img class="bento-thumb" src="../img/marketings/thumbnail02.jpg" alt="브로슈어 02" />
        <div class="bento-overlay">
          <span class="bento-tag">브로슈어 02</span>
          <span class="bento-icon">+</span>
        </div>
      </div>

      <!-- 5. marketing1 — scroll popup -->
      <div class="bento-item" data-label="SNS 콘텐츠 01"
           data-slides='[{"type":"scroll","src":"../img/marketings/marketing1.jpg"}]'>
        <img class="bento-thumb" src="../img/marketings/marketing1.jpg" alt="SNS 콘텐츠 01" />
        <div class="bento-overlay">
          <span class="bento-tag">SNS 콘텐츠 01</span>
          <span class="bento-icon">+</span>
        </div>
      </div>

      <!-- 6. marketing2 — scroll popup -->
      <div class="bento-item" data-label="SNS 콘텐츠 02"
           data-slides='[{"type":"scroll","src":"../img/marketings/marketing2.jpg"}]'>
        <img class="bento-thumb" src="../img/marketings/marketing2.jpg" alt="SNS 콘텐츠 02" />
        <div class="bento-overlay">
          <span class="bento-tag">SNS 콘텐츠 02</span>
          <span class="bento-icon">+</span>
        </div>
      </div>

      <!-- 7. print1 -->
      <div class="bento-item" data-label="인쇄물 디자인 01"
           data-slides='[{"type":"image","src":"../img/marketings/print1.jpg"}]'>
        <img class="bento-thumb" src="../img/marketings/print1.jpg" alt="인쇄물 디자인 01" />
        <div class="bento-overlay">
          <span class="bento-tag">인쇄물 디자인 01</span>
          <span class="bento-icon">+</span>
        </div>
      </div>

      <!-- 8. print2 -->
      <div class="bento-item" data-label="인쇄물 디자인 02"
           data-slides='[{"type":"image","src":"../img/marketings/print2.jpg"}]'>
        <img class="bento-thumb" src="../img/marketings/print2.jpg" alt="인쇄물 디자인 02" />
        <div class="bento-overlay">
          <span class="bento-tag">인쇄물 디자인 02</span>
          <span class="bento-icon">+</span>
        </div>
      </div>

    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" aria-hidden="true">
    <button class="modal-close" id="modalClose" aria-label="닫기">×</button>
    <div class="modal-content">
      <button class="modal-nav modal-prev" id="modalPrev" aria-label="이전">‹</button>
      <div class="modal-img-wrap" id="modalImgWrap"></div>
      <button class="modal-nav modal-next" id="modalNext" aria-label="다음">›</button>
    </div>
    <div class="modal-footer">
      <span class="modal-label" id="modalLabel"></span>
      <span class="modal-counter" id="modalCounter"></span>
    </div>
  </div>

  <script src="../js/marketing.js"></script>
</body>
</html>
